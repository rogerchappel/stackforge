name: Docs

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-hygiene:
    name: Docs hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Validate docs directory
        run: |
          set -euo pipefail

          test -d docs
          test -s docs/PRD.md

      - name: Validate markdown paths
        run: |
          set -euo pipefail

          find . -type f -name '*.md' -not -path './.git/*' -print | sort > markdown-files.txt
          test -s markdown-files.txt

          while IFS= read -r file; do
            test -s "$file"
          done < markdown-files.txt

      - name: Run docs release-readiness check
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile
          pnpm run docs:check
